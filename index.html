<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scaler Lab — API Authorization Attacks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c14;
    --bg-2:#0f1220;
    --bg-subtle:#0d1018;
    --bg-muted:rgba(255,255,255,0.045);
    --bg-card:rgba(255,255,255,0.028);
    --bg-card-2:rgba(255,255,255,0.045);
    --bg-input:#0a0d16;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.16);
    --text:#e6e8ef;
    --text-2:rgba(230,232,239,0.62);
    --text-3:rgba(230,232,239,0.38);
    --indigo:#818cf8;
    --indigo-50:rgba(129,140,248,0.14);
    --purple:#c084fc;
    --purple-50:rgba(192,132,252,0.14);
    --navy:#60a5fa;
    --navy-50:rgba(96,165,250,0.14);
    --amber:#fbbf24;
    --amber-50:rgba(251,191,36,0.14);
    --emerald:#34d399;
    --emerald-50:rgba(52,211,153,0.14);
    --red:#f87171;
    --yellow:#facc15;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.35);
    --shadow-md:0 4px 14px rgba(0,0,0,0.35);
    --shadow-lg:0 18px 48px -14px rgba(0,0,0,0.65), 0 8px 20px -6px rgba(0,0,0,0.35);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body{
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    background:var(--bg);
    background-image:
      radial-gradient(ellipse 900px 550px at 15% -5%, rgba(99,102,241,0.10), transparent 60%),
      radial-gradient(ellipse 800px 500px at 100% 110%, rgba(124,58,237,0.09), transparent 60%),
      radial-gradient(ellipse 700px 400px at 50% 50%, rgba(16,185,129,0.04), transparent 60%);
    background-attachment:fixed;
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    font-size:14px;
  }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input, textarea, select{ font-family:inherit; }
  code, pre, .mono{ font-family:'JetBrains Mono', ui-monospace, Menlo, monospace; }
  h1,h2,h3,h4{ margin:0; color:var(--text); }
  ::selection{ background:rgba(129,140,248,0.35); color:#fff; }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.1); border-radius:10px; border:2px solid transparent; background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover{ background:rgba(255,255,255,0.22); background-clip:padding-box; }

  /* ================= TOP NAV ================= */
  .topnav{
    position:sticky; top:0; z-index:100; height:60px; padding:0 26px;
    background:rgba(10,12,20,0.75);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{ display:flex; align-items:center; gap:12px; font-size:15px; letter-spacing:0.2px; }
  .brand-left{ font-weight:700; color:#fff; }
  .brand-sep{ color:rgba(255,255,255,0.22); font-weight:300; }
  .brand-right{ color:rgba(255,255,255,0.6); font-weight:400; }
  .status-pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 14px 6px 10px;
    background:rgba(16,185,129,0.10);
    border:1px solid rgba(16,185,129,0.28);
    color:#4ade80;
    border-radius:999px;
    font-size:12.5px; font-weight:500;
  }
  .pulse-dot{
    width:8px; height:8px; border-radius:50%; background:#22c55e;
    box-shadow:0 0 0 0 rgba(34,197,94,0.7);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(34,197,94,0.7); }
    70%{ box-shadow:0 0 0 10px rgba(34,197,94,0); }
    100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
  }

  /* ================= BREADCRUMB ================= */
  .crumbs{
    padding:13px 26px; display:flex; align-items:center; gap:10px;
    font-size:13px; color:rgba(255,255,255,0.55);
    background:rgba(0,0,0,0.2); border-bottom:1px solid var(--border);
  }
  .back-btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border:1px solid var(--border); border-radius:7px;
    font-size:12.5px; color:rgba(255,255,255,0.8);
    background:rgba(255,255,255,0.03); transition:all 0.15s;
  }
  .back-btn:hover{ background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.22); color:#fff; }
  .crumb-sep{ color:rgba(255,255,255,0.25); }
  .crumb-current{ color:#fff; font-weight:500; }

  /* ================= HOME ================= */
  .home-wrap{ max-width:1160px; margin:0 auto; padding:64px 26px 80px; position:relative; }
  .home-eyebrow{
    font-size:12px; letter-spacing:2.8px; text-transform:uppercase;
    color:#a78bfa; font-weight:600; margin-bottom:14px;
    display:inline-flex; align-items:center; gap:8px;
  }
  .home-eyebrow::before{
    content:''; width:18px; height:1px;
    background:linear-gradient(90deg, transparent, #a78bfa);
  }
  .home-title{
    font-size:44px; font-weight:800; letter-spacing:-1px;
    color:#fff; margin:0 0 16px 0; line-height:1.08;
  }
  .home-title .g{
    background:linear-gradient(90deg,#818cf8,#c084fc,#34d399);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .home-sub{
    font-size:16.5px; color:rgba(255,255,255,0.6); max-width:640px;
    line-height:1.6; margin:0 0 44px 0;
  }
  .cards-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
  @media (max-width:820px){
    .cards-grid{ grid-template-columns:1fr; }
    .home-title{ font-size:32px; }
    .home-wrap{ padding:44px 18px 60px; }
  }
  .lab-card{
    position:relative; padding:26px;
    background:linear-gradient(160deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018));
    border:1px solid var(--border); border-radius:16px;
    cursor:pointer;
    transition:all 0.22s cubic-bezier(.4,0,.2,1);
    overflow:hidden; display:flex; flex-direction:column;
    min-height:200px;
  }
  .lab-card::after{
    content:''; position:absolute; inset:-1px;
    border-radius:17px; padding:1px;
    background:linear-gradient(130deg, transparent 40%, var(--accent,#818cf8), transparent 70%);
    -webkit-mask:linear-gradient(#000,#000) content-box, linear-gradient(#000,#000);
    -webkit-mask-composite:xor; mask-composite:exclude;
    opacity:0; transition:opacity 0.25s; pointer-events:none;
  }
  .lab-card:hover{
    transform:translateY(-3px);
    border-color:transparent;
    box-shadow:var(--shadow-lg);
  }
  .lab-card:hover::after{ opacity:1; }
  .lab-card .icon-box{
    width:44px; height:44px; border-radius:11px;
    display:grid; place-items:center;
    background:rgba(255,255,255,0.05) !important;
    color:var(--accent,#a78bfa);
    margin-bottom:18px;
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:inset 0 0 12px rgba(255,255,255,0.02);
  }
  .lab-card h3{ margin:0 0 8px 0; color:#fff; font-size:19px; font-weight:700; letter-spacing:-0.2px; }
  .lab-card .desc{ color:rgba(255,255,255,0.58); font-size:14px; line-height:1.55; flex:1; }
  .lab-card .card-footer{
    margin-top:22px; padding-top:16px; border-top:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; font-size:12px;
  }
  .company-tag{ color:rgba(255,255,255,0.42); letter-spacing:0.3px; font-weight:500; }
  .enter-arrow{
    color:var(--accent,#a78bfa); font-weight:600; font-size:13px;
    opacity:0.85; transition:transform 0.2s, opacity 0.2s;
  }
  .lab-card:hover .enter-arrow{ transform:translateX(4px); opacity:1; }

  /* ================= SHARED PRIMITIVES ================= */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:9px 16px; border-radius:8px; font-weight:500; font-size:13.5px;
    transition:all 0.15s; border:1px solid transparent; line-height:1;
  }
  .btn-primary{
    background:#fff; color:#0a0c14;
  }
  .btn-primary:hover{ background:#e5e7eb; }
  .btn-primary:disabled{ opacity:0.5; cursor:wait; }
  .btn-accent{
    background:linear-gradient(135deg, var(--accent,#6366f1), var(--accent,#818cf8));
    color:#fff;
    box-shadow:0 4px 14px -4px var(--accent-ring,rgba(129,140,248,0.4));
  }
  .btn-accent:hover{ filter:brightness(1.1); transform:translateY(-1px); }
  .btn-accent:disabled{ opacity:0.5; cursor:wait; transform:none; }
  .btn-outline{
    background:rgba(255,255,255,0.03); color:var(--text);
    border:1px solid var(--border-strong);
  }
  .btn-outline:hover{ background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.3); }
  .btn-outline:disabled{ opacity:0.45; cursor:not-allowed; }
  .btn-ghost{ color:var(--text-2); padding:6px 10px; }
  .btn-ghost:hover{ color:var(--text); background:rgba(255,255,255,0.05); }

  .input, .textarea, .select{
    width:100%; padding:10px 12px; background:var(--bg-input);
    border:1px solid var(--border); border-radius:7px;
    font-size:13.5px; color:var(--text); outline:none;
    transition:border-color 0.15s, box-shadow 0.15s;
  }
  .input::placeholder, .textarea::placeholder{ color:var(--text-3); }
  .input:focus, .textarea:focus, .select:focus{
    border-color:var(--accent,#818cf8);
    box-shadow:0 0 0 3px var(--accent-ring,rgba(129,140,248,0.22));
  }
  .input.mono, .textarea.mono{ font-family:'JetBrains Mono',monospace; font-size:12.5px; }
  .textarea{ resize:vertical; line-height:1.6; }
  .select{ appearance:none; padding-right:30px; background-image:linear-gradient(45deg,transparent 50%,var(--text-2) 50%),linear-gradient(135deg,var(--text-2) 50%,transparent 50%); background-position:calc(100% - 15px) 50%, calc(100% - 10px) 50%; background-size:5px 5px; background-repeat:no-repeat; }
  .select option{ background:#11141f; color:var(--text); }

  .label{
    display:block; font-size:11.5px; font-weight:600;
    color:var(--text-2); letter-spacing:0.4px;
    text-transform:uppercase; margin-bottom:7px;
  }

  .card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
  }
  .card-head{
    padding:14px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    background:rgba(255,255,255,0.015);
  }
  .card-head h3{ font-size:14px; font-weight:600; color:#fff; }
  .card-head .sub{ font-size:12.5px; color:var(--text-2); margin-top:2px; }
  .card-body{ padding:18px; }

  .kbd{
    display:inline-block; padding:1px 6px; background:rgba(255,255,255,0.05);
    border:1px solid var(--border); border-radius:4px;
    font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text);
  }

  .pill{ display:inline-flex; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:0.3px; }
  .pill-gray{ background:rgba(255,255,255,0.06); color:var(--text-2); border:1px solid var(--border); }
  .pill-blue{ background:rgba(96,165,250,0.14); color:#93c5fd; border:1px solid rgba(96,165,250,0.25); }
  .pill-green{ background:rgba(52,211,153,0.14); color:#6ee7b7; border:1px solid rgba(52,211,153,0.28); }
  .pill-amber{ background:rgba(251,191,36,0.14); color:#fcd34d; border:1px solid rgba(251,191,36,0.28); }
  .pill-red{ background:rgba(248,113,113,0.14); color:#fca5a5; border:1px solid rgba(248,113,113,0.28); }
  .pill-purple{ background:rgba(192,132,252,0.14); color:#d8b4fe; border:1px solid rgba(192,132,252,0.28); }

  .method-badge{
    display:inline-block; padding:3px 8px; border-radius:4px;
    font-family:'JetBrains Mono',monospace; font-size:11px;
    font-weight:700; letter-spacing:0.5px;
  }
  .mb-get{ background:rgba(96,165,250,0.14); color:#93c5fd; border:1px solid rgba(96,165,250,0.2); }
  .mb-post{ background:rgba(52,211,153,0.14); color:#6ee7b7; border:1px solid rgba(52,211,153,0.2); }
  .mb-put{ background:rgba(251,191,36,0.14); color:#fcd34d; border:1px solid rgba(251,191,36,0.2); }
  .mb-delete{ background:rgba(248,113,113,0.14); color:#fca5a5; border:1px solid rgba(248,113,113,0.2); }

  .status-row{
    display:flex; align-items:center; gap:12px;
    padding:10px 14px; border-radius:8px;
    font-family:'JetBrains Mono',monospace; font-size:12.5px;
    font-weight:500; margin-bottom:12px;
  }
  .status-row.s200, .status-row.s201{ background:rgba(34,197,94,0.09); border:1px solid rgba(34,197,94,0.28); color:#86efac; }
  .status-row.s401{ background:rgba(234,179,8,0.09); border:1px solid rgba(234,179,8,0.30); color:#fde047; }
  .status-row.s403{ background:rgba(249,115,22,0.09); border:1px solid rgba(249,115,22,0.30); color:#fdba74; }
  .status-row.s404{ background:rgba(148,163,184,0.08); border:1px solid rgba(148,163,184,0.22); color:#cbd5e1; }
  .status-row.s429{ background:rgba(239,68,68,0.10); border:1px solid rgba(239,68,68,0.32); color:#fca5a5; }
  .status-row.s400, .status-row.s422{ background:rgba(234,179,8,0.09); border:1px solid rgba(234,179,8,0.30); color:#fde047; }

  .response-json{
    background:#07090f; border:1px solid var(--border);
    border-radius:8px; padding:14px 16px; font-size:12.5px;
    color:#d1d5db; white-space:pre-wrap; word-break:break-word;
    max-height:380px; overflow-y:auto; line-height:1.68;
    font-family:'JetBrains Mono',monospace;
  }
  .json-key{ color:#7dd3fc; }
  .json-string{ color:#86efac; }
  .json-number{ color:#fcd34d; }
  .json-bool{ color:#f9a8d4; }
  .json-null{ color:#94a3b8; }

  .flag-block{
    margin-top:16px; padding:16px 18px;
    background:linear-gradient(90deg, rgba(16,185,129,0.14), rgba(16,185,129,0.02));
    border:1px solid rgba(16,185,129,0.22);
    border-left:4px solid #10b981; border-radius:8px;
    display:flex; gap:14px; align-items:flex-start;
    box-shadow:0 4px 24px -8px rgba(16,185,129,0.35);
  }
  .flag-block .flag-icon{
    width:30px; height:30px; border-radius:8px;
    background:rgba(16,185,129,0.2); display:grid; place-items:center;
    color:#10b981; flex-shrink:0; border:1px solid rgba(16,185,129,0.35);
  }
  .flag-label{
    font-size:11px; font-weight:700; color:#6ee7b7;
    letter-spacing:1.6px; text-transform:uppercase; margin-bottom:5px;
  }
  .flag-msg{ font-size:13.5px; color:rgba(255,255,255,0.75); margin-bottom:10px; line-height:1.55; }
  .flag-value{
    font-family:'JetBrains Mono',monospace; font-size:14px;
    color:#fff; font-weight:600;
    background:rgba(0,0,0,0.45); border:1px solid rgba(16,185,129,0.3);
    padding:7px 12px; border-radius:6px;
    display:inline-block; word-break:break-all; user-select:all;
  }

  /* activity log panel */
  .log-panel{
    background:#05070d; color:#cbd5e1; border-radius:10px;
    overflow:hidden; border:1px solid rgba(255,255,255,0.07);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .log-head{
    padding:10px 14px; background:rgba(255,255,255,0.02);
    border-bottom:1px solid rgba(255,255,255,0.06);
    display:flex; align-items:center; justify-content:space-between;
    font-size:11.5px; letter-spacing:1.3px; text-transform:uppercase;
    font-weight:600; color:#94a3b8;
  }
  .log-head .dot{ display:inline-flex; align-items:center; gap:8px; }
  .log-head .dot::before{
    content:''; width:7px; height:7px; border-radius:50%;
    background:#10b981; box-shadow:0 0 10px #10b981;
  }
  .log-body{
    font-family:'JetBrains Mono',monospace; font-size:12px;
    padding:10px 14px; max-height:240px; overflow-y:auto;
    line-height:1.75;
  }
  .log-entry{ white-space:pre-wrap; word-break:break-all; padding:1px 0; }
  .log-entry .ts{ color:#475569; margin-right:6px; }
  .log-entry .tag{ display:inline-block; padding:0 5px; border-radius:3px; font-size:10.5px; font-weight:700; letter-spacing:0.3px; margin-right:6px; }
  .log-entry .tag.req{ background:rgba(59,130,246,0.2); color:#93c5fd; }
  .log-entry .tag.res-ok{ background:rgba(16,185,129,0.2); color:#6ee7b7; }
  .log-entry .tag.res-warn{ background:rgba(234,179,8,0.2); color:#fde68a; }
  .log-entry .tag.res-err{ background:rgba(239,68,68,0.2); color:#fca5a5; }
  .log-entry .tag.note{ background:rgba(148,163,184,0.15); color:#cbd5e1; }
  .log-entry.muted{ color:#64748b; }
  .log-entry.ok{ color:#86efac; }
  .log-entry.warn{ color:#fcd34d; }
  .log-entry.err{ color:#fca5a5; }
  .log-entry.info{ color:#93c5fd; }
  .log-empty{ color:#475569; font-style:italic; text-align:center; padding:24px 0; }

  /* stage indicator */
  .stages{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .stage{
    display:inline-flex; align-items:center; gap:7px; padding:6px 12px;
    background:rgba(255,255,255,0.03); border:1px solid var(--border);
    border-radius:999px; font-size:12px; color:var(--text-2);
  }
  .stage .num{
    width:18px; height:18px; border-radius:50%;
    background:rgba(255,255,255,0.06); color:var(--text-2);
    display:grid; place-items:center; font-size:11px; font-weight:700;
  }
  .stage.done{ border-color:rgba(16,185,129,0.35); background:rgba(16,185,129,0.1); color:#6ee7b7; }
  .stage.done .num{ background:#10b981; color:#fff; }
  .stage.active{ border-color:var(--accent); color:var(--accent); background:var(--accent-50); }
  .stage.active .num{ background:var(--accent); color:#fff; }

  .split{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:960px){ .split{ grid-template-columns:1fr; } }

  .lab-wrap{ max-width:1220px; margin:0 auto; padding:24px 26px 80px; }
  .lab-header{
    margin-bottom:22px; display:flex; align-items:flex-start;
    justify-content:space-between; gap:20px; flex-wrap:wrap;
    padding:20px 22px; border-radius:14px;
    background:linear-gradient(135deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015));
    border:1px solid var(--border);
    position:relative; overflow:hidden;
  }
  .lab-header::before{
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse 400px 180px at 0% 0%, var(--accent-50), transparent 60%);
    pointer-events:none;
  }
  .lab-brand{ display:flex; align-items:center; gap:14px; position:relative; z-index:1; }
  .lab-brand .mark{
    width:40px; height:40px; border-radius:11px; display:grid; place-items:center;
    color:#fff; font-weight:800; font-size:16px;
    box-shadow:0 4px 14px -4px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .lab-brand .name{ font-size:18px; font-weight:700; color:#fff; }
  .lab-brand .env{ font-size:12.5px; color:rgba(255,255,255,0.6); margin-top:2px; }

  /* ================= LAB 1: VaultHR ================= */
  .q1-accent{ --accent:#818cf8; --accent-50:rgba(129,140,248,0.12); --accent-ring:rgba(129,140,248,0.22); }
  .q1-shell{ display:grid; grid-template-columns:220px 1fr; gap:20px; }
  @media (max-width:900px){ .q1-shell{ grid-template-columns:1fr; } }
  .q1-nav{
    background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
    padding:10px; height:fit-content; position:sticky; top:80px;
    backdrop-filter:blur(8px);
  }
  .q1-nav-item{
    display:flex; align-items:center; gap:10px;

<body>

<nav class="topnav">
  <div class="brand">
    <span class="brand-left">Scaler Lab</span>
    <span class="brand-sep">|</span>
    <span class="brand-right">Cybersecurity</span>
  </div>
  <div class="status-pill">
    <span class="pulse-dot"></span>
    Lab Environment Active
  </div>
</nav>

<div id="app"></div>

<script>
/* ---------- obfuscated flags ---------- */
const _F = {
  q1: 'RmxhZ3tTY2FsZXJfQVVMVC1CT0xBLTFkLTRjYzNzcy1ieXA0c3N9',
  q2: 'RmxhZ3tTY2FsZXJfTkVYVVMtTUFTUy00U1MxR04tUFIxVi1FU0N9',
  q3: 'RmxhZ3tTY2FsZXJfUFVMU0UtUjRUMy1MMU0xVC1YLUZXRC1CWVA0U1N9',
  q4: 'RmxhZ3tTY2FsZXJfT1JCSVQtRlVOQ1QxME4tTDNWM0wtQVVUSC1CWVA0U1N9'
};
const dec = s => atob(s);

/* ---------- helpers ---------- */
const $ = (sel, r = document) => r.querySelector(sel);
const $$ = (sel, r = document) => Array.from(r.querySelectorAll(sel));
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const sleep = ms => new Promise(r => setTimeout(r, ms));

function syntaxJSON(obj){
  const j = JSON.stringify(obj, null, 2);
  return j.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(?:\\.|[^"\\])*")(\s*:)/g,'<span class="json-key">$1</span>$2')
    .replace(/:\s*("(?:\\.|[^"\\])*")/g,': <span class="json-string">$1</span>')
    .replace(/:\s*(-?\d+\.?\d*)/g,': <span class="json-number">$1</span>')
    .replace(/:\s*(true|false)/g,': <span class="json-bool">$1</span>')
    .replace(/:\s*null/g,': <span class="json-null">null</span>');
}

function flagBlock(message, flag){
  return `
    <div class="flag-block">
      <div class="flag-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <div style="flex:1">
        <div class="flag-label">Objective Complete</div>
        <div class="flag-msg">${esc(message)}</div>
        <div class="flag-value">${esc(flag)}</div>
      </div>
    </div>
  `;
}

function statusRow(status, text, meta){
  const cls = 's' + status;
  return `<div class="status-row ${cls}"><strong>${status}</strong><span style="opacity:0.8;">${esc(text)}</span>${meta?`<span style="margin-left:auto; opacity:0.65;">${esc(meta)}</span>`:''}</div>`;
}

function nowTs(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${String(d.getMilliseconds()).padStart(3,'0')}`;
}

/* ---------- log panel helpers ---------- */
function makeLog(logId, initialNote){
  return `
    <div class="log-panel">
      <div class="log-head">
        <span class="dot">Network &amp; Server Activity</span>
        <span style="color:#475569; font-weight:500;">${initialNote||'live'}</span>
      </div>
      <div class="log-body" id="${logId}">
        <div class="log-empty">// waiting for activity</div>
      </div>
    </div>`;
}

function logPush(logId, entries){
  const el = document.getElementById(logId);
  if (!el) return;
  const empty = el.querySelector('.log-empty');
  if (empty) empty.remove();
  const lines = Array.isArray(entries) ? entries : [entries];
  lines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'log-entry ' + (line.cls || '');
    const ts = `<span class="ts">${nowTs()}</span>`;
    let tagHtml = '';
    if (line.tag) tagHtml = `<span class="tag ${line.tagCls||''}">${esc(line.tag)}</span>`;
    div.innerHTML = `${ts}${tagHtml}${line.html || esc(line.text || '')}`;
    el.appendChild(div);
  });
  el.scrollTop = el.scrollHeight;
}

/* ---------- router ---------- */
const routes = {
  'home': renderHome,
  'q1': renderQ1,
  'q2': renderQ2,
  'q3': renderQ3,
  'q4': renderQ4
};

function route(){
  const h = (location.hash || '#home').slice(1);
  const fn = routes[h] || renderHome;
  $('#app').innerHTML = '';
  try{ fn(); } catch(e){ console.error(e); $('#app').innerHTML = '<div class="lab-wrap">Something went wrong.</div>'; }
  window.scrollTo(0, 0);
}
window.addEventListener('hashchange', route);

function breadcrumb(labName){
  return `
    <div class="crumbs">
      <a href="#home" class="back-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back
      </a>
      <span>Labs</span>
      <span class="crumb-sep">/</span>
      <span>API Authorization Attacks</span>
      <span class="crumb-sep">/</span>
      <span class="crumb-current">${esc(labName)}</span>
    </div>
  `;
}

function stagesHTML(stages, current){
  return `<div class="stages">${stages.map((s,i)=>{
    const state = i < current ? 'done' : (i === current ? 'active' : '');
    return `<div class="stage ${state}"><div class="num">${i+1}</div>${esc(s)}</div>`;
  }).join('<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>')}</div>`;
}

/* ==================================================================== */
/*                              HOME                                    */
/* ==================================================================== */
function renderHome(){
  const cards = [
    { route:'#q1', accent:'#4f46e5', accentBg:'#eef2ff',
      icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
      title:'Document Access', desc:'An HR portal where employees can retrieve their own records. Something slips through.', company:'VaultHR People Portal' },
    { route:'#q2', accent:'#7c3aed', accentBg:'#f5f3ff',
      icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11h-6"/><path d="M19 8v6"/></svg>',
      title:'Workspace Signup', desc:'New accounts spin up in seconds. Every registration ends up in the same user model.', company:'Nexus Platform' },
    { route:'#q3', accent:'#1e3a8a', accentBg:'#eff6ff',
      icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
      title:'Account Recovery', desc:'A four-digit PIN stands between you and a locked account. The server has its defenses.', company:'PulseBank Customer Portal' },
    { route:'#q4', accent:'#059669', accentBg:'#ecfdf5',
      icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
      title:'Publishing Workspace', desc:'An editor account with a documented API. Not every route is on the map.', company:'OrbitCMS Admin Portal' }
  ];
  $('#app').innerHTML = `
    <div class="home-wrap">
      <div class="home-eyebrow">API Authorization Attacks</div>
      <h1 class="home-title">Find the flaw.<br/>Chain the request.</h1>
      <p class="home-sub">Four sandboxed product environments. Each hides an authorization flaw in its business logic. You explore, probe, and chain requests together until the system reveals what it shouldn't.</p>
      <div class="cards-grid">
        ${cards.map(c => `
          <a href="${c.route}" class="lab-card" style="--accent:${c.accent}; --accent-bg:${c.accentBg};">
            <div class="icon-box" style="background:${c.accentBg};">${c.icon}</div>
            <h3>${c.title}</h3>
            <div class="desc">${c.desc}</div>
            <div class="card-footer">
              <span class="company-tag">${c.company}</span>
              <span class="enter-arrow">Open →</span>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `;
}

/* ==================================================================== */
/*                           LAB PLACEHOLDERS                           */
/* ==================================================================== */

async function q1LoadDoc(){
  const btn = $('#q1Send');
  const out = $('#q1DocResp');
  const url = $('#q1Url').value.trim();
  Q1.state.currentDocPath = url;
  btn.disabled = true;
  out.innerHTML = `<div class="muted smaller" style="padding:10px 0;">Loading…</div>`;
  logPush('q1Log', { tag:'GET', tagCls:'req', html:`<span style="color:#93c5fd;">${esc(url)}</span>` });
  const t0 = performance.now();
  await sleep(170 + Math.random()*130);
  const dt = Math.round(performance.now() - t0);

  const m = url.match(/\/api\/v1\/documents\/DOC-(\d+)-(\d+)/);
  let status = 404, statusText = 'Not Found', body;

  if (!m) {
    body = { error:'route_not_found', hint:'expected /api/v1/documents/DOC-{employee_id}-{seq}' };
    logPush('q1Log', { tag:'404', tagCls:'res-err', cls:'err', text:`route not found (${dt}ms)` });
  } else {
    const ownerId = parseInt(m[1],10), seq = parseInt(m[2],10);
    const owner = Q1.directory.find(d=>d.id===ownerId);
    if (ownerId < 1000 || ownerId > 1200 || seq < 1 || seq > 5) {
      body = { error:'document_not_found', document_id: `DOC-${ownerId}-${String(seq).padStart(2,'0')}` };
      logPush('q1Log', { tag:'404', tagCls:'res-err', cls:'err', text:`document not found (${dt}ms)` });
    } else {
      status = 200; statusText = 'OK';
      body = q1BuildDocument(ownerId, seq, owner);
      Q1.state.viewedDocs.add(`${ownerId}-${seq}`);
      logPush('q1Log', [
        { tag:'200', tagCls:'res-ok', cls:'ok', text:`document served (${dt}ms)` },
        { tag:'auth', tagCls:'note', cls:'muted', text:`session.user_id=${Q1.meId}  resource.owner_id=${ownerId}  ${ownerId===Q1.meId?'✓ own_record':'↯ cross_user (endpoint does not validate resource ownership)'}` }
      ]);
      if (ownerId === 1099 && seq === 1) {
        logPush('q1Log', { tag:'ref', tagCls:'note', cls:'info', text:'response body includes field archive_reference → consult the Archive Lookup endpoint' });
      }
    }
  }

  let html = statusRow(status, statusText, `${dt}ms · ${new Blob([JSON.stringify(body)]).size}B`);
  html += `<pre class="response-json">${syntaxJSON(body)}</pre>`;
  out.innerHTML = html;
  btn.disabled = false;
}

function q1BuildDocument(id, seq, owner){
  const titles = {
    1:'Q1 Payslip', 2:'Benefits Enrollment Form', 3:'Annual Tax Statement', 4:'Offer Letter', 5:'Policy Acknowledgement'
  };
  const base = {
    document_id: `DOC-${id}-${String(seq).padStart(2,'0')}`,
    kind: ['payslip','benefits','tax','offer','policy'][seq-1] || 'general',
    title: titles[seq] || 'Internal Document',
    employee_id: id,
    employee_name: owner ? owner.name : `Employee ${id}`,
    issued_at: `2026-0${((id+seq)%9)+1}-${String(((id*seq)%27)+1).padStart(2,'0')}`,
    status: 'filed'
  };
  if (id === Q1.meId) {
    base.note = 'This document is accessible to you as the employee of record.';
    if (seq === 1) base.gross_pay = '$6,420.00';
  } else {
    base.note = 'Standard HR document.';
    if (seq === 1) base.gross_pay = `$${(4000 + (id%30)*140).toLocaleString()}.00`;
  }
  if (id === 1099 && seq === 1) {
    base.kind = 'separation_agreement';
    base.title = 'Severance & Separation Agreement';
    base.classification = 'restricted';
    base.signed_by_exec = 'R. Okafor (CHRO)';
    base.archive_reference = Q1.archiveRef;
    base.note = 'Confidential. Full terms held in Archive Vault — retrieve via reference.';
  }
  return base;
}

async function q1ArchiveSubmit(){
  const ref = $('#q1ArchiveRef').value.trim();
  const out = $('#q1ArchiveResp');
  const btn = $('#q1ArchiveGo');
  if (!ref) return;
  btn.disabled = true;
  out.innerHTML = `<div class="muted smaller" style="padding:10px 0;">Resolving…</div>`;
  logPush('q1Log', { tag:'GET', tagCls:'req', html:`<span style="color:#93c5fd;">/api/v1/archives/${esc(ref)}</span>` });
  const t0 = performance.now();
  await sleep(200 + Math.random()*140);
  const dt = Math.round(performance.now() - t0);

  if (ref === Q1.archiveRef) {
    Q1.state.solved = true;
    Q1.state.archiveRefFound = ref;
    const body = {
      reference: ref,
      status: 'resolved',
      document_id: 'DOC-1099-01',
      classification: 'restricted',
      retrieval_granted: true,
      content_excerpt: 'In consideration of the separation, the undersigned…',
      recovery_token: dec(_F.q1)
    };
    logPush('q1Log', [
      { tag:'200', tagCls:'res-ok', cls:'ok', text:`archive resolved (${dt}ms)` },
      { tag:'perm', tagCls:'note', cls:'muted', text:'archive.lookup: permission=restricted  grant=ref_holder (caller identity not checked)' }
    ]);
    out.innerHTML = statusRow(200,'OK',`${dt}ms`) + `<pre class="response-json">${syntaxJSON(body)}</pre>` +
      flagBlock('Cross-tenant record pulled from an employee endpoint; reference embedded in it unlocked the archive. Final token issued by the archive service.', dec(_F.q1));
  } else {
    const body = { error:'archive_not_found', reference: ref, hint:'reference tokens are embedded in the source document when archived' };
    logPush('q1Log', { tag:'404', tagCls:'res-err', cls:'err', text:`archive ref not found (${dt}ms)` });
    out.innerHTML = statusRow(404,'Not Found',`${dt}ms`) + `<pre class="response-json">${syntaxJSON(body)}</pre>`;
  }
  btn.disabled = false;
}

function q2SyncPayload(){
  const ta = $('#q2Payload'); if (!ta) return;
  // Only auto-sync when user hasn't manually edited (simple heuristic: no newlines added that introduce unknown keys)
  if (document.activeElement === ta) return;
  const body = { name: $('#q2Name').value, email: $('#q2Email').value, password: $('#q2Pass').value };
  ta.value = JSON.stringify(body, null, 2);
}

async function q2DoRegister(){
  const adv = !$('#q2AdvWrap').classList.contains('hide');
  let payload;
  if (adv) {
    try { payload = JSON.parse($('#q2Payload').value); }
    catch {
      $('#q2SignupResp').innerHTML = statusRow(400,'Bad Request') + `<pre class="response-json">${syntaxJSON({error:'invalid_json', message:'Request body is not valid JSON.'})}</pre>`;
      return;
    }
  } else {
    payload = { name: $('#q2Name').value, email: $('#q2Email').value, password: $('#q2Pass').value };
  }
  const btn = $('#q2Submit'); btn.disabled = true;
  $('#q2SignupResp').innerHTML = `<div class="muted smaller" style="padding:14px 0;">Submitting…</div>`;
  logPush('q2Log', [
    { tag:'POST', tagCls:'req', html:`<span style="color:#93c5fd;">/api/v1/register</span>` },
    { tag:'body', tagCls:'note', cls:'muted', text:`fields received: [${Object.keys(payload).join(', ')}]` }
  ]);
  const t0 = performance.now();
  await sleep(220 + Math.random()*140);
  const dt = Math.round(performance.now() - t0);

  if (!payload.name || !payload.email || !payload.password) {
    $('#q2SignupResp').innerHTML = statusRow(422,'Unprocessable Entity',`${dt}ms`) + `<pre class="response-json">${syntaxJSON({error:'missing_fields', required:['name','email','password']})}</pre>`;
    logPush('q2Log', { tag:'422', tagCls:'res-warn', cls:'warn', text:`missing required fields (${dt}ms)` });
    btn.disabled = false; return;
  }

  const role = ['admin','member'].includes(payload.role) ? payload.role : 'member';
  const tier = ['free','pro','enterprise'].includes(payload.account_tier) ? payload.account_tier : 'free';
  const verified = payload.is_verified === true ? true : false;
  const session = {
    account_id: 'acct_' + Math.random().toString(36).slice(2,11),
    name: String(payload.name),
    email: String(payload.email),
    role, account_tier: tier, is_verified: verified,
    access_token: 'nx_' + Math.random().toString(36).slice(2,20),
    created_at: new Date().toISOString()
  };
  Q2.state.session = session;
  Q2.state.signedIn = true;
  Q2.state.lastRequest = { method:'POST', path:'/api/v1/register', body:payload, response_fields:Object.keys(session) };
  Q2.state.tab = 'overview';

  logPush('q2Log', [
    { tag:'201', tagCls:'res-ok', cls:'ok', text:`account created (${dt}ms) role=${role} tier=${tier} verified=${verified}` },
    { tag:'map', tagCls:'note', cls:'muted', text:`model.User ← body  (all submitted keys bound without allow-list filter)` }
  ]);
  if (role === 'admin') logPush('q2Log', { tag:'grant', tagCls:'res-warn', cls:'info', text:'admin scope granted via submitted field role=admin' });

  await sleep(250);
  q2Paint();
}

async function q2RevealVault(id){
  const out = $('#q2VaultResp');
  out.innerHTML = `<div class="muted smaller" style="padding:10px 0;">Decrypting…</div>`;
  logPush('q2Log', { tag:'GET', tagCls:'req', html:`<span style="color:#93c5fd;">/api/v1/vault/secrets/${esc(id)}</span>` });
  const t0 = performance.now();
  await sleep(230 + Math.random()*120);
  const dt = Math.round(performance.now() - t0);

  const entry = Q2.vaultEntries.find(v => v.id === id);
  const s = Q2.state.session;

  if (s.role !== 'admin') {
    out.innerHTML = statusRow(403,'Forbidden',`${dt}ms`) + `<pre class="response-json">${syntaxJSON({error:'insufficient_scope', required:'role=admin'})}</pre>`;
    logPush('q2Log', { tag:'403', tagCls:'res-err', cls:'err', text:`vault access denied (role=${s.role})` });
    return;
  }

  let body;
  let flagShown = false;
  if (entry.id === 'vlt_01') body = { id:entry.id, name:entry.name, value:{ host:'smtp.mailgun.org', user:'postmaster@nx', password:'n3xus-smtp-7712' } };
  else if (entry.id === 'vlt_03') body = { id:entry.id, name:entry.name, value:{ access_key:'AKIA…N7Q', secret:'wJalr…XYZ', bucket:'nexus-bkp' } };
  else if (entry.id === 'vlt_02') {
    if (s.account_tier !== 'enterprise') {
      out.innerHTML = statusRow(403,'Forbidden',`${dt}ms`) + `<pre class="response-json">${syntaxJSON({error:'tier_required', required:'account_tier=enterprise'})}</pre>`;
      logPush('q2Log', { tag:'403', tagCls:'res-err', cls:'err', text:`tier gate (need enterprise, have ${s.account_tier})` });
      return;
    }
    body = { id:entry.id, name:entry.name, value:{ dsn:'postgresql://prod:******@db-primary.internal/nexus' } };
  } else if (entry.id === 'vlt_04') {
    if (s.account_tier !== 'enterprise' || !s.is_verified) {
      out.innerHTML = statusRow(403,'Forbidden',`${dt}ms`) + `<pre class="response-json">${syntaxJSON({error:'conditions_unmet', required:{ role:'admin', account_tier:'enterprise', is_verified:true }, current:{ role:s.role, account_tier:s.account_tier, is_verified:s.is_verified }})}</pre>`;
      logPush('q2Log', { tag:'403', tagCls:'res-err', cls:'err', text:'recovery kit withheld: need verified enterprise admin' });
      return;
    }
    Q2.state.solved = true;
    body = {
      id:entry.id, name:entry.name,
      value:{
        recovery_kit_version: 'v3',
        decryption_phrase: dec(_F.q2),
        issued_to: s.email,
        grant_reason: 'verified_enterprise_admin'
      }
    };
    flagShown = true;
  }

  let html = statusRow(200,'OK',`${dt}ms`) + `<pre class="response-json">${syntaxJSON(body)}</pre>`;
  if (flagShown) html += flagBlock('Fields outside the registration contract produced an elevated account; that session unlocked a gated vault entry whose payload carries the final token.', dec(_F.q2));
  out.innerHTML = html;
  logPush('q2Log', { tag:'200', tagCls:'res-ok', cls:'ok', text:`vault reveal OK (${dt}ms)` });
  Q2.state.revealed[id] = true;
}

function q3AddHeader(){

async function q3VerifyPin(){
  const pin = ($('#q3Pin').value || '').trim();
  if (!/^\d{4}$/.test(pin)) {
    $('#q3PinResp').innerHTML = statusRow(400,'Bad Request') + `<pre class="response-json">${syntaxJSON({error:'pin_format', message:'PIN must be four digits.'})}</pre>`;
    return;
  }
  const btn = $('#q3Verify'); btn.disabled = true;
  const headers = q3ReadCustomHeaders();
  // determine rate-limit bucket
  let bucket = 'direct:198.51.100.42'; // simulated real IP
  let trustApplied = null;
  for (const h of Q3.trustedHeaders) {
    if (headers[h]) { bucket = 'ip:' + headers[h].split(',')[0].trim(); trustApplied = h; break; }
  }
  Q3.state.ipCounters[bucket] = (Q3.state.ipCounters[bucket] || 0) + 1;
  Q3.state.attempts++;
  $('#q3StatAttempts').textContent = Q3.state.attempts;

  logPush('q3Log', [
    { tag:'POST', tagCls:'req', html:`<span style="color:#93c5fd;">/api/v1/recovery/verify-pin</span>  body=${JSON.stringify({pin})}` },
    { tag:'rl', tagCls:'note', cls:'muted', text:`ratelimit: bucket=${bucket} count=${Q3.state.ipCounters[bucket]}/5${trustApplied?`  (trusted header ${trustApplied} honored)`:''}` }
  ]);

  const t0 = performance.now();
  await sleep(180 + Math.random()*120);
  const dt = Math.round(performance.now() - t0);

  if (Q3.state.ipCounters[bucket] > 5) {
    $('#q3StatRate').textContent = 'blocked'; $('#q3StatRate').style.color = '#b91c1c';
    const body = { error:'rate_limited', bucket, retry_after_seconds: 60 };
    $('#q3PinResp').innerHTML = statusRow(429,'Too Many Requests',`${dt}ms`) + `<pre class="response-json">${syntaxJSON(body)}</pre>`;
    logPush('q3Log', { tag:'429', tagCls:'res-err', cls:'err', text:`bucket exhausted: ${bucket}` });
    btn.disabled = false; return;
  }

  $('#q3StatRate').textContent = 'ready'; $('#q3StatRate').style.color = '#047857';
  if (pin === Q3.pin) {
    const token = 'rst_' + Math.random().toString(36).slice(2,18);
    Q3.state.recoveryToken = token;
    Q3.state.tokensIssued += 1;
    $('#q3StatTokens').textContent = Q3.state.tokensIssued;
    const body = { verified:true, account:Q3.account, recovery_session_token: token, expires_in: 300 };
    let html = statusRow(200,'OK',`${dt}ms`) + `<pre class="response-json">${syntaxJSON(body)}</pre>`;
    html += `<div class="mt-12 flex gap-8 items-center"><button id="q3Proceed" class="btn btn-primary">Proceed to unlock →</button><span class="muted smaller">Token has been copied into step 3.</span></div>`;
    $('#q3PinResp').innerHTML = html;
    $('#q3Proceed').addEventListener('click', () => { Q3.state.step = 3; q3RenderStep(); });
    logPush('q3Log', [
      { tag:'200', tagCls:'res-ok', cls:'ok', text:`pin accepted (${dt}ms)` },
      { tag:'issue', tagCls:'note', cls:'info', text:`recovery_session_token issued → use on /api/v1/recovery/unlock` }
    ]);
  } else {
    const body = { verified:false, error:'invalid_pin', attempts_remaining_in_bucket: Math.max(0, 5 - Q3.state.ipCounters[bucket]) };
    $('#q3PinResp').innerHTML = statusRow(401,'Unauthorized',`${dt}ms`) + `<pre class="response-json">${syntaxJSON(body)}</pre>`;
    logPush('q3Log', { tag:'401', tagCls:'res-warn', cls:'warn', text:`pin rejected · remaining_in_bucket=${body.attempts_remaining_in_bucket}` });
  }
  btn.disabled = false;
}

async function q3DoUnlock(){
  const tok = ($('#q3Tok').value || '').trim();
  const btn = $('#q3Unlock'); btn.disabled = true;
  const out = $('#q3UnlockResp');
  out.innerHTML = `<div class="muted smaller" style="padding:10px 0;">Redeeming…</div>`;
  logPush('q3Log', { tag:'POST', tagCls:'req', html:`<span style="color:#93c5fd;">/api/v1/recovery/unlock</span>  body={ recovery_session_token: &quot;${esc(tok)}&quot; }` });
  const t0 = performance.now();
  await sleep(220 + Math.random()*120);
  const dt = Math.round(performance.now() - t0);

  if (!tok || tok !== Q3.state.recoveryToken) {
    out.innerHTML = statusRow(401,'Unauthorized',`${dt}ms`) + `<pre class="response-json">${syntaxJSON({error:'invalid_or_expired_token'})}</pre>`;
    logPush('q3Log', { tag:'401', tagCls:'res-warn', cls:'warn', text:'token not recognized' });
    btn.disabled = false; return;
  }

  Q3.state.solved = true;
  const body = {
    status:'unlocked',
    account: Q3.account,
    recovery_document:{
      holder:'M. Okonkwo',
      issued_at: new Date().toISOString(),
      auth_backup_phrase: dec(_F.q3),
      notice:'Store this phrase. It is required to authorize the next reset.'
    }
  };
  let html = statusRow(200,'OK',`${dt}ms`) + `<pre class="response-json">${syntaxJSON(body)}</pre>`;
  html += flagBlock('The rate limiter trusted the forwarded IP on every verify; a brute-forced PIN produced a session token, and that token unlocked the recovery document.', dec(_F.q3));
  out.innerHTML = html;
  logPush('q3Log', [
    { tag:'200', tagCls:'res-ok', cls:'ok', text:`unlock granted (${dt}ms)` },
    { tag:'done', tagCls:'note', cls:'info', text:'recovery document returned · lab objective complete' }
  ]);
  btn.disabled = false;
}
