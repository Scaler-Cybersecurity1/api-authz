<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scaler Lab — API Authorization Attacks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #0b0d12;
    color: #e6e8ef;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }
  code, pre, .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }

  /* ---------- GLOBAL NAV ---------- */
  .topnav {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 60px;
    padding: 0 28px;
    background: rgba(10, 12, 17, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    letter-spacing: 0.2px;
  }
  .brand-left { font-weight: 700; color: #fff; }
  .brand-sep { color: rgba(255,255,255,0.25); font-weight: 300; }
  .brand-right { color: rgba(255,255,255,0.65); font-weight: 400; }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px 6px 10px;
    background: rgba(34, 197, 94, 0.10);
    border: 1px solid rgba(34, 197, 94, 0.28);
    color: #4ade80;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 500;
  }
  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34,197,94, 0.7);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,197,94, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(34,197,94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94, 0); }
  }

  /* ---------- BREADCRUMB ---------- */
  .breadcrumb-bar {
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px;
    font-size: 12.5px;
    color: rgba(255,255,255,0.8);
    transition: all 0.15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.25); }
  .crumb-sep { color: rgba(255,255,255,0.3); }
  .crumb-current { color: #fff; font-weight: 500; }

  /* ---------- HOME ---------- */
  .home-wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 64px 28px 80px;
  }
  .home-eyebrow {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8b5cf6;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .home-title {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
    margin: 0 0 14px 0;
    line-height: 1.1;
  }
  .home-sub {
    font-size: 17px;
    color: rgba(255,255,255,0.6);
    max-width: 640px;
    line-height: 1.55;
    margin: 0 0 48px 0;
  }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
  }
  @media (max-width: 820px) {
    .cards-grid { grid-template-columns: 1fr; }
    .home-title { font-size: 32px; }
  }
  .lab-card {
    position: relative;
    padding: 28px;
    background: linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(.4,.0,.2,1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 200px;
  }
  .lab-card:hover {
    transform: translateY(-3px);
    border-color: rgba(139, 92, 246, 0.35);
    box-shadow: 0 18px 45px -12px rgba(139,92,246,0.25);
  }
  .lab-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent, #8b5cf6), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .lab-card:hover::before { opacity: 1; }
  .lab-card .icon-box {
    width: 44px;
    height: 44px;
    border-radius: 11px;
    display: grid;
    place-items: center;
    background: var(--accent-bg, rgba(139,92,246,0.13));
    color: var(--accent, #a78bfa);
    margin-bottom: 18px;
  }
  .lab-card h3 {
    margin: 0 0 8px 0;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .lab-card .desc {
    color: rgba(255,255,255,0.6);
    font-size: 14.5px;
    line-height: 1.5;
    flex: 1;
  }
  .lab-card .card-footer {
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }
  .company-tag {
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.3px;
    font-weight: 500;
  }
  .enter-arrow {
    color: var(--accent, #a78bfa);
    font-weight: 600;
    font-size: 13px;
    opacity: 0.8;
    transition: transform 0.2s;
  }
  .lab-card:hover .enter-arrow { transform: translateX(3px); opacity: 1; }

  /* ---------- SHARED RESPONSE ---------- */
  .status-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .status-row.s200 { background: rgba(34,197,94,0.09); border: 1px solid rgba(34,197,94,0.25); color: #4ade80; }
  .status-row.s401 { background: rgba(234,179,8,0.09); border: 1px solid rgba(234,179,8,0.28); color: #facc15; }
  .status-row.s403 { background: rgba(249,115,22,0.09); border: 1px solid rgba(249,115,22,0.28); color: #fb923c; }
  .status-row.s404 { background: rgba(148,163,184,0.09); border: 1px solid rgba(148,163,184,0.25); color: #cbd5e1; }
  .status-row.s429 { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.30); color: #f87171; }
  .status-row.s201 { background: rgba(34,197,94,0.09); border: 1px solid rgba(34,197,94,0.25); color: #4ade80; }
  .response-json {
    background: #0a0e14;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: #d1d5db;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 440px;
    overflow-y: auto;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
  }
  .json-key { color: #7dd3fc; }
  .json-string { color: #86efac; }
  .json-number { color: #fcd34d; }
  .json-bool { color: #f9a8d4; }
  .json-null { color: #94a3b8; }
  .flag-block {
    margin-top: 16px;
    padding: 16px 18px;
    background: linear-gradient(90deg, rgba(34,197,94,0.10), rgba(34,197,94,0.02));
    border-left: 4px solid #22c55e;
    border-radius: 7px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .flag-block .flag-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: rgba(34,197,94,0.18);
    display: grid;
    place-items: center;
    color: #22c55e;
    flex-shrink: 0;
  }
  .flag-label {
    font-size: 11.5px;
    font-weight: 700;
    color: #22c55e;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .flag-msg {
    font-size: 13.5px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .flag-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #fff;
    font-weight: 600;
    background: rgba(0,0,0,0.35);
    padding: 7px 12px;
    border-radius: 5px;
    display: inline-block;
    word-break: break-all;
    user-select: all;
  }

  /* ---------- LAB 1 — VAULTHR ---------- */
  .vh-wrap {
    --vh-navy: #0f1729;
    --vh-indigo: #4f46e5;
    --vh-accent: #818cf8;
    background: #0a0f1e;
    min-height: calc(100vh - 60px);
  }
  .vh-header {
    padding: 22px 28px;
    background: linear-gradient(135deg, #0f1729 0%, #1e1b4b 100%);
    border-bottom: 1px solid rgba(129,140,248,0.18);
  }
  .vh-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .vh-logo-mark {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, #4f46e5, #818cf8);
    display: grid;
    place-items: center;
    color: #fff;
    font-weight: 800;
    font-size: 14px;
  }
  .vh-tag {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-left: 40px;
  }
  .vh-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 28px 60px;
  }
  @media (max-width: 960px) {
    .vh-layout { grid-template-columns: 1fr; }
  }
  .vh-panel {
    background: #0f1729;
    border: 1px solid rgba(129,140,248,0.16);
    border-radius: 12px;
    overflow: hidden;
  }
  .vh-panel-head {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(129,140,248,0.14);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(79,70,229,0.06);
  }
  .vh-panel-head h3 {
    margin: 0;
    font-size: 13px;
    color: #c7d2fe;
    letter-spacing: 0.4px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .vh-panel-body { padding: 18px; }

  .vh-method-url {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .vh-method {
    padding: 11px 14px;
    background: rgba(34,197,94,0.12);
    color: #4ade80;
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    display: grid;
    place-items: center;
    min-width: 62px;
  }
  .vh-url {
    flex: 1;
    padding: 11px 14px;
    background: #0a0f1e;
    border: 1px solid rgba(129,140,248,0.25);
    border-radius: 8px;
    color: #e0e7ff;
    font-size: 13.5px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  .vh-url:focus { border-color: #6366f1; }

  .vh-section-label {
    font-size: 11.5px;
    letter-spacing: 1.5px;
    color: rgba(199,210,254,0.5);
    font-weight: 600;
    text-transform: uppercase;
    margin: 14px 0 8px 0;
  }
  .vh-header-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 10px;
    padding: 9px 12px;
    background: #0a0f1e;
    border: 1px solid rgba(129,140,248,0.15);
    border-radius: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    margin-bottom: 6px;
  }
  .vh-header-row .k { color: #a5b4fc; }
  .vh-header-row .v { color: #cbd5e1; word-break: break-all; }

  .vh-btn {
    margin-top: 18px;
    padding: 12px 20px;
    width: 100%;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    transition: all 0.18s;
    letter-spacing: 0.3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .vh-btn:hover { background: linear-gradient(135deg, #6366f1, #818cf8); transform: translateY(-1px); }
  .vh-btn:disabled { opacity: 0.5; cursor: wait; transform: none; }

  .vh-empty {
    color: rgba(199,210,254,0.35);
    text-align: center;
    padding: 60px 20px;
    font-size: 13.5px;
  }
  .vh-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: rgba(199,210,254,0.55);
    margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .vh-meta .lbl { color: rgba(199,210,254,0.35); margin-right: 4px; }

  /* ---------- LAB 2 — NEXUS ---------- */
  .nx-wrap {
    background: #0b1020;
    min-height: calc(100vh - 60px);
  }
  .nx-header {
    padding: 22px 28px;
    border-bottom: 1px solid rgba(139,92,246,0.18);
    background: linear-gradient(135deg, #1a1033 0%, #0b1020 100%);
  }
  .nx-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  .nx-logo-mark {
    width: 28px; height: 28px;
    border-radius: 9px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    display: grid;
    place-items: center;
    color: #fff;
    font-weight: 800;
    font-size: 14px;
  }
  .nx-tag {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-left: 40px;
    margin-top: 2px;
  }
  .nx-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 28px 60px;
  }
  @media (max-width: 960px) {
    .nx-layout { grid-template-columns: 1fr; }
  }
  .nx-panel {
    background: #141829;
    border: 1px solid rgba(139,92,246,0.17);
    border-radius: 12px;
    overflow: hidden;
  }
  .nx-panel-head {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(139,92,246,0.15);
    background: rgba(139,92,246,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nx-panel-head h3 {
    margin: 0;
    font-size: 13px;
    color: #ddd6fe;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .nx-panel-body { padding: 18px; }
  .nx-endpoint {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #0b1020;
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-bottom: 18px;
  }
  .nx-endpoint .m {
    background: rgba(234,179,8,0.15);
    color: #facc15;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .nx-endpoint .p { color: #ddd6fe; }
  .nx-field-list {
    background: #0b1020;
    border: 1px solid rgba(139,92,246,0.15);
    border-radius: 8px;
    overflow: hidden;
  }
  .nx-field-row {
    display: grid;
    grid-template-columns: 130px 90px 1fr;
    gap: 14px;
    padding: 11px 14px;
    border-bottom: 1px solid rgba(139,92,246,0.08);
    font-size: 13px;
  }
  .nx-field-row:last-child { border-bottom: none; }
  .nx-field-row .fname {
    color: #c4b5fd;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .nx-field-row .ftype {
    color: rgba(196,181,253,0.5);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .nx-field-row .fdesc { color: rgba(255,255,255,0.55); font-size: 12.5px; }
  .nx-req {
    color: #f87171;
    font-size: 10.5px;
    margin-left: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .nx-body-ta {
    width: 100%;
    height: 170px;
    padding: 14px;
    background: #0b1020;
    border: 1px solid rgba(139,92,246,0.22);
    border-radius: 8px;
    color: #e9d5ff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    resize: vertical;
    line-height: 1.6;
  }
  .nx-body-ta:focus { border-color: #a855f7; }

  .nx-btn {
    margin-top: 14px;
    padding: 11px 20px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    transition: all 0.18s;
    width: 100%;
  }
  .nx-btn:hover { background: linear-gradient(135deg, #a855f7, #c084fc); }
  .nx-btn:disabled { opacity: 0.5; cursor: wait; }

  .nx-hint {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(196,181,253,0.45);
    line-height: 1.5;
  }

  /* ---------- LAB 3 — PULSEBANK ---------- */
  .pb-wrap {
    background: #0a0a0c;
    color: #f5e3a1;
    min-height: calc(100vh - 60px);
    font-family: 'JetBrains Mono', monospace;
  }
  .pb-header {
    padding: 20px 28px;
    border-bottom: 1px solid rgba(245,158,11,0.20);
    background: linear-gradient(135deg, #18120a 0%, #0a0a0c 100%);
  }
  .pb-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 700;
    color: #fbbf24;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }
  .pb-logo-mark {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: #fbbf24;
    display: grid;
    place-items: center;
    color: #0a0a0c;
    font-weight: 800;
    font-size: 14px;
  }
  .pb-tag { color: rgba(245,158,11,0.6); font-size: 12.5px; margin-left: 40px; }
  .pb-layout {
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 28px 60px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .pb-panel {
    background: #111111;
    border: 1px solid rgba(245,158,11,0.18);
    border-radius: 8px;
  }
  .pb-panel-head {
    padding: 11px 16px;
    border-bottom: 1px solid rgba(245,158,11,0.14);
    color: #fbbf24;
    font-size: 11.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pb-panel-body { padding: 16px; }
  .pb-target-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  @media (max-width: 720px) {
    .pb-target-grid { grid-template-columns: 1fr; }
  }
  .pb-stat {
    padding: 12px 14px;
    background: #0a0a0c;
    border: 1px solid rgba(245,158,11,0.12);
    border-radius: 6px;
  }
  .pb-stat .l {
    font-size: 10.5px;
    color: rgba(245,158,11,0.55);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .pb-stat .v {
    color: #fbbf24;
    font-size: 14px;
    font-weight: 600;
  }
  .pb-stat .sub {
    color: rgba(245,227,161,0.45);
    font-size: 11.5px;
    margin-top: 3px;
  }

  .pb-row {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 10px;
    margin-bottom: 12px;
    align-items: center;
  }
  .pb-label {
    color: rgba(251,191,36,0.7);
    font-size: 11.5px;
    letter-spacing: 1px;
    text-transform: uppercase;

async function q1Send() {

  await sleep(180 + Math.random() * 120);
  const dt = Math.round(performance.now() - t0);

  const match = url.match(/\/v1\/employees\/(\d+)/);
  let status = 404, statusText = 'Not Found', body;

  if (!match) {
    body = { error: 'route_not_found', message: 'No handler for the requested path.' };
  } else {
    const id = parseInt(match[1], 10);
    if (id < 1000 || id > 1200) {
      status = 404; statusText = 'Not Found';
      body = { error: 'employee_not_found', message: `No employee with id=${id}.` };

      status = 200; statusText = 'OK';
      body = q1Employee(id);

  }

  const cls = status === 200 ? 's200' : (status === 404 ? 's404' : 's401');
  let html = `

    <pre class="response-json">${syntaxJSON(body)}</pre>
  `;
  if (status === 200 && body.severance_agreement) {

  }
  resp.innerHTML = html;
  btn.disabled = false;
}

async function q2Send() {
  const btn = $('#nxSend');
  const resp = $('#nxResp');
  const raw = $('#nxBody').value;
  btn.disabled = true;
  resp.innerHTML = `<div style="color:rgba(196,181,253,0.5); font-size:13px; padding:14px 0;">Sending…</div>`;
  const t0 = performance.now();
  await sleep(200 + Math.random() * 120);
  const dt = Math.round(performance.now() - t0);

  let parsed;
  try { parsed = JSON.parse(raw); }
  catch {
    resp.innerHTML = `
      <div class="status-row s401" style="background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:#f87171;">
        <strong>400</strong><span style="opacity:0.7;">Bad Request · ${dt}ms</span>
      </div>
      <pre class="response-json">${syntaxJSON({error:'invalid_json', message:'Request body was not valid JSON.'})}</pre>`;
    btn.disabled = false;
    return;
  }
  if (!parsed.name || !parsed.email || !parsed.password) {
    resp.innerHTML = `
      <div class="status-row s401">
        <strong>422</strong><span style="opacity:0.7;">Unprocessable Entity · ${dt}ms</span>
      </div>
      <pre class="response-json">${syntaxJSON({error:'missing_fields', required:['name','email','password']})}</pre>`;
    btn.disabled = false;
    return;
  }

  const body = {
    account_id: 'acct_' + Math.random().toString(36).slice(2, 12),
    name: String(parsed.name),
    email: String(parsed.email),
    role: parsed.role !== undefined ? String(parsed.role) : 'member',
    account_tier: parsed.account_tier !== undefined ? String(parsed.account_tier) : 'free',
    is_verified: parsed.is_verified !== undefined ? !!parsed.is_verified : false,
    created_at: new Date().toISOString()
  };

  const privileged =
    parsed.role === 'admin' &&
    parsed.account_tier === 'enterprise' &&
    parsed.is_verified === true;

  if (privileged) body.debug_token = dec(_S.q2Token);

  let html = `
    <div class="status-row s201">
      <strong>201</strong><span style="opacity:0.7;">Created · ${dt}ms · ${new Blob([JSON.stringify(body)]).size}B</span>
    </div>
    <pre class="response-json">${syntaxJSON(body)}</pre>
  `;
  if (privileged) {
    html += flagBlock('Mass assignment accepted undocumented fields. Role, tier, and verification status were all overwritten.', dec(_F.q2));
  }
  resp.innerHTML = html;
  btn.disabled = false;
}

async function q3Send() {
  if (q3State.solved) return;
  const btn = $('#pbSend');
  const log = $('#pbLog');
  const xff = $('#pbXff').value.trim();
  const raw = $('#pbBody').value;

  let parsed;
  try { parsed = JSON.parse(raw); } catch {
    q3Append('info', `// invalid JSON body — not sent`);
    return;
  }

  btn.disabled = true;
  q3Append('info', `→ POST /verify-pin  ${xff ? `[X-Forwarded-For: ${xff}]` : '[no spoofing]'}  body=${JSON.stringify(parsed)}`);

  const t0 = performance.now();
  await sleep(160 + Math.random() * 110);
  const dt = Math.round(performance.now() - t0);

  const ipKey = xff || q3State.defaultIpKey;
  q3State.ipCounters[ipKey] = (q3State.ipCounters[ipKey] || 0) + 1;
  q3State.pinsTried += 1;
  q3State.lastIpUsed = ipKey;

  let status, statusText, body;
  if (q3State.ipCounters[ipKey] > 5) {
    status = 429; statusText = 'Too Many Requests';
    body = { error: 'rate_limited', message: 'Too many attempts from this origin. Try again later.', retry_after_seconds: 900 };
  } else {
    const pin = String(parsed.pin || '');
    if (pin === '2847') {
      status = 200; statusText = 'OK';
      body = { verified: true, account: '4829-0012', session_escalation_token: 'pb_escalate_' + Math.random().toString(36).slice(2,10) };
    } else {
      status = 401; statusText = 'Unauthorized';
      body = { verified: false, error: 'invalid_pin', attempts_remaining_ip: Math.max(0, 5 - q3State.ipCounters[ipKey]) };
    }
  }

  q3Append('s' + status, `← ${status} ${statusText}  ${dt}ms  ${JSON.stringify(body)}`);
  $('#pbAttempts').textContent = q3State.pinsTried;
  $('#pbCurrentIp').textContent = 'last ip: ' + (xff || 'none');
  $('#pbRateStatus').textContent = status === 429 ? 'blocked' : 'ready';
  $('#pbRateStatus').style.color = status === 429 ? '#f87171' : '#4ade80';

  if (status === 200 && !q3State.solved) {
    q3State.solved = true;
    $('#pbFlagSlot').innerHTML = `
      <div class="pb-panel">
        <div class="pb-panel-body" style="padding:16px;">
          ${flagBlock('Rate limit bypassed via IP spoofing. PIN enumeration succeeded.', dec(_F.q3))}
        </div>
      </div>
    `;
  }

  btn.disabled = false;
}

function q3Append(cls, text) {
  const log = $('#pbLog');
  if (log.querySelector('.pb-log-empty')) log.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'pb-log-entry ' + cls;
  const time = new Date().toISOString().slice(11, 19);
  row.textContent = `[${time}] ${text}`;
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
}

      user_id: 'editor-42',

      name: 'Sam Rivera',
      role: 'editor',
      permissions: ['content:read','content:write','media:read'],
      created_at: '2024-09-11T10:22:00Z',

        self: '/api/v1/users/me',
        content: '/api/v1/content',
        admin_panel: '/api/v1/admin/users'
      }
    }, isFlag: false };
  }
  if (method === 'GET' && u === '/api/v1/content') {
    return { status: 200, statusText: 'OK', body: {
